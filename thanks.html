<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>送信完了 | リースバック無料条件確認</title>
  <meta name="description" content="リースバック無料条件確認フォームの送信が完了しました。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #061733;
      --muted: #536070;
      --blue: #143b8a;
      --orange: #e94916;
      --line: rgba(6, 23, 51, 0.14);
      --paper: #fffaf0;
      --white: #fffefb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      background:
        repeating-linear-gradient(135deg, rgba(6, 23, 51, 0.025) 0 1px, transparent 1px 8px),
        var(--paper);
      color: var(--ink);
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      line-height: 1.8;
    }

    .thanks-shell {
      display: grid;
      min-height: 100dvh;
      place-items: center;
      padding: 32px 16px;
    }

    .thanks-card {
      width: min(100%, 760px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 254, 251, 0.94);
      padding: clamp(28px, 5vw, 54px);
      text-align: center;
      box-shadow: 0 18px 40px rgba(6, 23, 51, 0.08);
    }

    .thanks-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: #fff2e8;
      color: var(--orange);
      padding: 5px 16px;
      font-size: 0.92rem;
      font-weight: 900;
    }

    .thanks-title {
      margin: 0;
      font-family: "Noto Serif JP", "Yu Mincho", "Hiragino Mincho ProN", serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.28;
    }

    .thanks-lead {
      margin: 20px auto 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.12rem);
      font-weight: 700;
    }

    .thanks-note {
      margin: 28px auto 0;
      max-width: 560px;
      border-left: 4px solid var(--orange);
      background: #fff;
      padding: 16px 18px;
      color: var(--ink);
      text-align: left;
      font-size: 0.95rem;
    }

    .thanks-actions {
      margin-top: 30px;
    }

    .thanks-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      border-radius: 999px;
      background: var(--orange);
      color: #fff;
      padding: 12px 28px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(233, 73, 22, 0.2);
    }

    .thanks-footer {
      margin-top: 26px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .thanks-footer a {
      color: var(--blue);
      font-weight: 700;
    }
  </style>
  <script src="assets/gtm.js"></script>
  <script src="assets/affilicode-tracking.js" defer></script>
</head>
<body>
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T57VZZWR" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <main class="thanks-shell">
    <section class="thanks-card" aria-labelledby="thanks-title">
      <div class="thanks-badge">送信完了</div>
      <h1 class="thanks-title" id="thanks-title">お問い合わせを受け付けました</h1>
      <p class="thanks-lead">
        ご入力いただいた内容を確認し、担当者より折り返しご連絡いたします。
      </p>
      <p class="thanks-note">
        ご状況によって確認にお時間をいただく場合があります。お急ぎの場合も、担当者からの連絡をお待ちください。
      </p>
      <div class="thanks-actions">
        <a class="thanks-button" href="index.html">トップページへ戻る</a>
      </div>
      <p class="thanks-footer">
        運営会社 asp management　<a href="privacy-policy.html">プライバシーポリシー</a>
      </p>
    </section>
  </main>
</body>
</html>

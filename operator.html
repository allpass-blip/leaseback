<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>運営者情報 | イエトク！</title>
    <meta
      name="description"
      content="リースバック一括査定サービス「イエトク！」の運営者情報です。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #082d5f;
        --ink: #1f3045;
        --muted: #5e6a78;
        --line: #dbe2e9;
        --gold: #c79b36;
        --paper: #f4f7f9;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
        line-height: 1.75;
      }

      a {
        color: inherit;
      }

      .shell {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 28px 16px 56px;
      }

      .back {
        display: inline-flex;
        margin-bottom: 20px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
        text-decoration: none;
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 36px rgba(8, 45, 95, 0.08);
      }

      header {
        padding: 28px 24px 24px;
        border-top: 4px solid var(--gold);
        border-bottom: 1px solid var(--line);
      }

      header img {
        display: block;
        width: min(100%, 300px);
        height: auto;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0;
        color: var(--navy);
        font-family: "Noto Serif JP", "Yu Mincho", serif;
        font-size: clamp(28px, 7vw, 40px);
        line-height: 1.35;
      }

      header p {
        margin: 10px 0 0;
        color: var(--muted);
      }

      dl {
        margin: 0;
        padding: 8px 24px 24px;
      }

      dl div {
        display: grid;
        grid-template-columns: 8em minmax(0, 1fr);
        gap: 18px;
        padding: 18px 0;
        border-bottom: 1px solid var(--line);
      }

      dt {
        color: var(--navy);
        font-weight: 700;
      }

      dd {
        margin: 0;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px 24px;
        padding: 20px 24px 24px;
        border-top: 1px solid var(--line);
        background: #f9fbfc;
        font-size: 14px;
        font-weight: 700;
      }

      .links a {
        color: var(--navy);
      }

      footer {
        margin-top: 20px;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      @media (max-width: 560px) {
        .shell {
          width: 390px;
          max-width: 100%;
        }

        .card {
          border-radius: 14px;
        }

        dl div {
          grid-template-columns: 1fr;
          gap: 4px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <a class="back" href="/variant-b/">← イエトク！へ戻る</a>
      <article class="card">
        <header>
          <img
            src="/assets/variant-b/images/logo-ietoku-mobile.webp"
            width="774"
            height="235"
            alt="イエトク！ リースバック一括査定"
          />
          <h1>運営者情報</h1>
          <p>「イエトク！」は株式会社シードが運営しています。</p>
        </header>
        <dl>
          <div><dt>会社名</dt><dd>株式会社シード</dd></div>
          <div><dt>英文社名</dt><dd>Seed, Inc.</dd></div>
          <div><dt>代表者</dt><dd>代表取締役 宮澤 直幸</dd></div>
          <div><dt>設立</dt><dd>2018年6月22日</dd></div>
          <div><dt>資本金</dt><dd>900万円</dd></div>
          <div>
            <dt>本社所在地</dt>
            <dd>〒105-0011<br />東京都港区芝公園三丁目4番30号 32芝公園ビル8階</dd>
          </div>
          <div><dt>電話番号</dt><dd>050-1809-4557</dd></div>
          <div><dt>宅建免許番号</dt><dd>東京都知事（2）第102596号</dd></div>
          <div><dt>加盟協会</dt><dd>社団法人不動産保証協会東京都本部</dd></div>
        </dl>
        <nav class="links" aria-label="関連情報">
          <a href="/privacy-policy.html">プライバシーポリシー</a>
          <a
            href="https://seed2.tokyo/service/%E4%BC%9A%E7%A4%BE%E6%A6%82%E8%A6%81/"
            target="_blank"
            rel="noopener"
            >株式会社シード公式サイト</a
          >
        </nav>
      </article>
      <footer>© 2026 イエトク All rights reserved</footer>
    </main>
  </body>
</html>
